<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | EscuderoGarcia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .contact-card { background: white; border-radius: 20px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); padding: 40px; width: 100%; max-width: 600px; }
        .btn-custom { background: #3b82f6; border: none; padding: 12px; font-weight: 600; border-radius: 12px; transition: 0.3s; }
        .btn-custom:hover { background: #2563eb; transform: translateY(-2px); }
        .back-link { color: #64748b; text-decoration: none; font-weight: 600; margin-bottom: 20px; display: inline-block; transition: 0.2s; }
        .back-link:hover { color: #0f172a; }
        .form-control { border-radius: 10px; padding: 12px; background-color: #f1f5f9; border: 1px solid #e2e8f0; }
        .form-control:focus { box-shadow: none; border-color: #3b82f6; background-color: white; }
    </style>
</head>
<body>

    <div class="contact-card">
        <a href="./index.html" class="back-link">← Volver al inicio</a>
        
        <h2 class="fw-bold mb-2">📬 Hablemos</h2>
        <p class="text-muted mb-4">¿Tienes dudas sobre nuestro despliegue en Azure o nuestro código fuente? Déjanos un mensaje.</p>

        <form action="https://formspree.io/f/mnjgvjkw" method="POST">
            
            <div class="mb-3">
                <label for="nombre" class="form-label fw-bold small">Nombre</label>
                <input type="text" class="form-control" id="nombre" name="nombre" placeholder="Ej. Ada Lovelace" required>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label fw-bold small">Correo Electrónico</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="ada@ejemplo.com" required>
            </div>

            <div class="mb-3">
                <label for="asunto" class="form-label fw-bold small">Asunto</label>
                <input type="text" class="form-control" id="asunto" name="asunto" placeholder="Duda sobre CI/CD" required>
            </div>

            <div class="mb-4">
                <label for="mensaje" class="form-label fw-bold small">Mensaje</label>
                <textarea class="form-control" id="mensaje" name="mensaje" rows="4" placeholder="Escribe tu mensaje aquí..." required></textarea>
            </div>

            <button type="submit" class="btn btn-primary btn-custom w-100 text-white">Enviar Mensaje</button>
        </form>
    </div>

</body>
</html>
